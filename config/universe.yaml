# 予測対象の銘柄ユニバースとマーケット指標の定義。
#
# - code     : 4桁の証券コード（J-Quants 用）
# - yf_symbol: yfinance 用シンボル（東証は ".T" を付与）
# - name     : 表示名
#
# PoC では流動性の高い大型株に絞る（10〜30銘柄）。確定リストは要調整。

