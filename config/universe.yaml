# 特徴量に使うマーケット指標・為替（yfinance シンボル）
market:
  - { key: "nikkei225", yf_symbol: "^N225",  name: "日経平均株価" }
  - { key: "topix_etf", yf_symbol: "1306.T", name: "TOPIX連動型ETF（TOPIX代理）" }
  - { key: "usdjpy",    yf_symbol: "JPY=X",   name: "ドル円" }
  - { key: "sp500",     yf_symbol: "^GSPC",   name: "S&P500（前日終値）" }
